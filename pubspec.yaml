name: hermes_mobile
description: "Mobile client for Hermes Agent"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Networking & SSH
  dio: ^5.8.0
  dartssh2: ^2.12.0

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # UI / rendering
  flutter_markdown: ^0.7.7
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.1

  # Utilities
  file_picker: ^10.1.2
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
